name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Use JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Generate Protobufs
        run: cd server && chmod +x generate_protos.sh && ./generate_protos.sh
      - name: Install root dependencies
        run: npm install --legacy-peer-deps
      - name: Install client dependencies
        run: cd client && npm install --legacy-peer-deps
      - name: Run Lint
        run: npm run lint

  test-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        run: cd client && npm install --legacy-peer-deps
      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Generate Protobufs
        run: cd server && chmod +x generate_protos.sh && ./generate_protos.sh
      - name: Run client tests
        run: cd client && npm run test --watch=false
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}

  # The visual-regression (Playwright screen-diff) suite is intentionally
  # not part of CI. Its baselines are large binary PNGs that we don't track
  # in git (see .gitignore and docs/REPO_CLEANUP.md §1), so a fresh CI
  # checkout has no expected images to compare against and every assertion
  # would fail. Run visual tests locally before merging UI-affecting changes:
  #   ./scripts/run_client_screendiff_tests.sh [--update-snapshots]
  # If we ever decide to gate CI on visual regression again, the snapshot
  # files (or a subset) will need to come back into the repo, or the job
  # will need to operate as a "regenerate and upload as artifact for human
  # review" step rather than a hard pass/fail.

  test-server:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        run: cd client && npm install --legacy-peer-deps
      - name: Install LibSSL 1.1 (for MongoDB)
        run: |
          wget http://archive.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2_amd64.deb
          sudo dpkg -i libssl1.1_1.1.1f-1ubuntu2_amd64.deb
      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Generate Protobufs
        # Match local environment exactly by running the generation script first
        run: |
          cd server
          chmod +x generate_protos.sh
          ./generate_protos.sh
      - name: Build and test with Maven
        # skipProtobuf=true since we just generated them with the script
        run: |
          cd server
          mvn test -DskipProtobuf=true \
                   -Dde.flapdoodle.embed.mongo.artifacts=/tmp/.embedmongo \
                   -Djava.io.tmpdir=/tmp
