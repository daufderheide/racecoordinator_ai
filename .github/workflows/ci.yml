name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Use JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Generate Protobufs
        run: cd server && chmod +x generate_protos.sh && ./generate_protos.sh
      - name: Install root dependencies
        run: npm install --legacy-peer-deps
      - name: Install client dependencies
        run: cd client && npm install --legacy-peer-deps
      - name: Run Lint
        run: npm run lint

  test-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        run: cd client && npm install --legacy-peer-deps
      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Generate Protobufs
        run: cd server && chmod +x generate_protos.sh && ./generate_protos.sh
      - name: Run client tests
        run: cd client && npm run test --watch=false
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}

  test-visual:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy
      options: --ipc=host
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        run: cd client && npm install --legacy-peer-deps
      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('client/package-lock.json') }}
      - name: Install Playwright Browsers
        run: cd client && npx playwright install
      - name: Use JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Protoc
        run: apt-get update && apt-get install -y protobuf-compiler
      - name: Generate Protobufs
        run: cd server && chmod +x generate_protos.sh && ./generate_protos.sh
      - name: Run visual tests
        run: cd client && npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results-${{ matrix.shardIndex }}
          path: client/test-results/

  test-server:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        run: cd client && npm install --legacy-peer-deps
      - name: Install LibSSL 1.1 (for MongoDB)
        run: |
          wget http://archive.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2_amd64.deb
          sudo dpkg -i libssl1.1_1.1.1f-1ubuntu2_amd64.deb
      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Generate Protobufs
        # Match local environment exactly by running the generation script first
        run: |
          cd server
          chmod +x generate_protos.sh
          ./generate_protos.sh
      - name: Build and test with Maven
        # skipProtobuf=true since we just generated them with the script
        run: |
          cd server
          mvn test -DskipProtobuf=true \
                   -Dde.flapdoodle.embed.mongo.artifacts=/tmp/.embedmongo \
                   -Djava.io.tmpdir=/tmp
