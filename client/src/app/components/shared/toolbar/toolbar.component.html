<div class="toolbar-container">
  <!-- Undo -->
  <button *ngIf="showUndo" class="toolbar-btn undo" (click)="undo()" [disabled]="!canUndo"
    [title]="'DE_TOOLTIP_UNDO' | translate">
    <span class="material-icons">undo</span>
  </button>

  <!-- Redo -->
  <button *ngIf="showRedo" class="toolbar-btn redo" (click)="redo()" [disabled]="!canRedo"
    [title]="'DE_TOOLTIP_REDO' | translate">
    <span class="material-icons">redo</span>
  </button>

  <!-- Edit -->
  <button *ngIf="showEdit" id="edit-track-btn" class="toolbar-btn ghost" (click)="onEdit()" [disabled]="isSaving"
    [title]="'TM_EDIT' | translate">
    <span class="material-icons">edit</span>
  </button>

  <!-- Copy -->
  <button *ngIf="showCopy" id="copy-item-btn" class="toolbar-btn info" (click)="onCopy()" [disabled]="isSaving"
    [title]="'TEM_BTN_SAVE_AS_NEW' | translate">
    <span class="material-icons">content_copy</span>
  </button>

  <!-- Add -->
  <button *ngIf="showAdd" id="add-item-btn" class="toolbar-btn info" (click)="onAdd()" [disabled]="isSaving"
    [title]="'TM_CREATE_NEW' | translate">
    <span class="material-icons">add</span>
  </button>

  <!-- Delete -->
  <button *ngIf="showDelete" id="delete-track-btn" class="toolbar-btn danger" (click)="onDelete()" [disabled]="isSaving"
    [title]="'TM_DELETE' | translate">
    <span class="delete-x">X</span>
  </button>

  <div class="spacer"></div>

  <!-- Help -->
  <button *ngIf="showHelp" id="help-track-btn" class="toolbar-btn help" (click)="onHelp()"
    [title]="'RDS_MENU_TUTORIAL' | translate">
    <svg viewBox="0 0 24 24" class="help-svg">
      <path
        d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7zm2.85 11.1l-.85.6V16h-4v-2.3l-.85-.6C7.8 12.16 7 10.63 7 9c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.63-.8 3.16-2.15 4.1z" />
    </svg>
  </button>
</div>
