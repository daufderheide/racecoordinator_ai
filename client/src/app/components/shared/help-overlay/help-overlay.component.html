@if (isVisible) {
  <div class="help-overlay-container" [ngClass]="{ ready: isInitialized }">
    <!-- The "Hole" Highlight -->
    @if (highlightStyle) {
      <div class="highlight-mask" [ngStyle]="highlightStyle"></div>
    }
    <!-- Full Backdrop if no target (or if target, strict modal) -->
    @if (!highlightStyle) {
      <div class="backdrop" (click)="end()"></div>
    }
    <!-- The Popover -->
    @if (isVisible) {
      <div
        class="help-popover"
        #popoverRef
        [ngStyle]="popoverStyle"
        [ngClass]="popoverClass"
      >
        <div class="popover-header">
          <h3>{{ currentStep?.title || "" | translate }}</h3>
          <button class="close-btn" (click)="end()">×</button>
        </div>
        <div class="popover-content">
          <p [innerHTML]="currentStep?.content || '' | translate"></p>
        </div>
        <div class="popover-footer">
          @if (helpService.steps) {
            <div class="step-counter">
              {{ helpService.currentStepIndex + 1 }} /
              {{ helpService.steps.length }}
            </div>
          }
          <div class="actions">
            <button
              class="btn-prev"
              (click)="previous()"
              [disabled]="!hasPrevious"
            >
              {{ "HELP_TUTORIAL_BACK" | translate }}
            </button>
            @if (hasNext) {
              <button class="btn-next" (click)="next()">
                {{ "HELP_TUTORIAL_NEXT" | translate }}
              </button>
            }
            @if (!hasNext) {
              <button class="btn-finish" (click)="end()">Finish</button>
            }
          </div>
        </div>
      </div>
    }
  </div>
}
