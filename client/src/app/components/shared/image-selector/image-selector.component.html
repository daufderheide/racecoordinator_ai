<div class="image-selector-container">
  @if (label()) {
    <label class="image-label">{{ label() }}</label>
  }
  <div
    class="image-preview"
    [class.dragging]="isDragging"
    [class.small]="size() === 'small'"
    [class.medium]="size() === 'medium'"
    [class.large]="size() === 'large'"
    (drop)="onDrop($event)"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (click)="openSelector()"
  >
    @if (imageUrl() || pendingPreview) {
      <app-asset-preview
        [assetId]="assetId()"
        [type]="assetType()"
        [imageUrl]="pendingPreview || imageUrl()"
        [images]="images()"
        [animate]="true"
      >
      </app-asset-preview>
    }
    @if (imageUrl() && !pendingPreview && !isUploading && !disabled()) {
      <div
        class="remove-button"
        (click)="removeImage($event)"
        [title]="'UE_BTN_REMOVE_IMAGE' | translate"
      >
        <span class="material-icons" style="font-size: 1.2rem">close</span>
      </div>
    }
    @if (!imageUrl() && !pendingPreview) {
      <div class="drop-hint">
        {{ "UE_HINT_DRAG_IMAGE" | translate }}
      </div>
    }
    @if (isUploading) {
      <div class="upload-overlay">
        <div class="spinner"></div>
      </div>
    }
  </div>
</div>

<app-item-selector
  [visible]="showSelector"
  [title]="'UE_TITLE_SELECT_IMAGE' | translate"
  [items]="assets()"
  [itemType]="assetType()"
  (select)="onAssetSelected($event)"
  (close)="closeSelector()"
>
</app-item-selector>
