<div class="panel-card on-deck-panel">
  <div class="on-deck-title">{{ "RD_WIN_ON_DECK" | translate }}</div>
  <div class="on-deck-list">
    @for (hd of onDeckDrivers(); track trackByDriver($index, hd)) {
      <div class="on-deck-item">
        <span class="driver-nickname">{{
          hd.driver.nickname || hd.driver.name
        }}</span>
        <span
          class="lane-badge"
          [style.background-color]="getLaneBackgroundColor(hd.laneIndex)"
          [style.color]="getLaneForegroundColor(hd.laneIndex)"
          [style.border-color]="getLaneForegroundColor(hd.laneIndex)"
        >
          L{{ hd.laneIndex + 1 }}
        </span>
      </div>
    } @empty {
      <div class="on-deck-empty">{{ "GEN_NA" | translate }}</div>
    }
  </div>
</div>
