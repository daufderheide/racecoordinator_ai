<div class="panel-card branding-panel">
  <div class="logo-text">
    Race Coordinator <span class="logo-highlight">AI</span>
  </div>
  <a
    href="https://github.com/daufderheide/racecoordinator_ai/tree/main"
    target="_blank"
    class="branding-tagline"
  >
    {{ "RD_TAGLINE" | translate }}
  </a>
  @if (qrCodeUrl) {
    <div class="branding-qr" title="Scan to connect mobile devices">
      <img [src]="qrCodeUrl" alt="QR Code" />
    </div>
  }
</div>
