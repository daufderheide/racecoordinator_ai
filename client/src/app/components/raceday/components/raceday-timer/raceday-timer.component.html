<div #timerPanel class="panel-card timer-panel">
  <div class="timer-wrapper">
    <!-- Top area for auto-advance label (always rendered to reserve space) -->
    <div class="label-container top-label">
      @if (autoStatusLabel() && !showCountdownOverlay()) {
        <div class="status-label">
          {{ autoStatusLabel() | translate }}
        </div>
      }
    </div>

    <!-- Clock: fixed height, always centered exactly -->
    <div
      #timerText
      class="timer-text"
      [class.timer-warmup]="isWarmup()"
      [class.timer-auto]="
        autoStatusLabel() && !showCountdownOverlay() && !isWarmup()
      "
      [style.font-family]="widget()?.customSettings?.['timeFontFamily'] || null"
      [style.font-size.px]="
        widget()?.scaleMode === 'fixed' || !widget()?.scaleMode
          ? widget()?.customSettings?.['timeFontSize'] || null
          : null
      "
      [style.color]="widget()?.customSettings?.['timeTextColor'] || null"
    >
      {{ formattedTime() }}
    </div>

    <!-- Bottom area for warmup label (always rendered to reserve space) -->
    <div class="label-container bottom-label">
      @if (isWarmup()) {
        <div class="warmup-label">
          {{ "RD_WARMUP" | translate }}
        </div>
      }
    </div>
  </div>
</div>
