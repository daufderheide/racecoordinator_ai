syntax = "proto3";
package com.antigravity;

option java_package = "com.antigravity.proto";
option java_multiple_files = true;
option java_outer_classname = "TrackmateConfigProto";

message TrackmateConfig {
  string name = 1;
  string comm_port = 2;
  bool normally_closed_relays = 3;
  bool use_ir = 4;
  int32 debounce = 5;
  int32 num_lanes = 6;
}
