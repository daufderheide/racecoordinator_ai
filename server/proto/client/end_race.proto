syntax = "proto3";
package com.antigravity;

option java_package = "com.antigravity.proto";
option java_multiple_files = true;
option java_outer_classname = "EndRaceProto";

message EndRaceRequest {
  // Empty message to trigger end race
}

message EndRaceResponse {
  bool success = 1;
  string message = 2;
}
