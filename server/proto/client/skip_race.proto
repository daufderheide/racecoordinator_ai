syntax = "proto3";
package com.antigravity;

option java_package = "com.antigravity.proto";
option java_multiple_files = true;
option java_outer_classname = "SkipRaceProto";

message SkipRaceRequest {
  // Empty message to trigger skip race
}

message SkipRaceResponse {
  bool success = 1;
  string message = 2;
}
